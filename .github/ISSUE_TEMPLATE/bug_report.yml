name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide a minimal set of steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: What version or commit hash are you running?
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local development
        - Docker
        - Production / deployed
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: If applicable, add logs, screenshots, or error messages.
